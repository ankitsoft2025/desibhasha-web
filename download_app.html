<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download App - Desibhasha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="download_app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="logo.jpeg" alt="DesiBhasha Logo" height="40" class="d-inline-block align-top"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#features">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="download_app.html">Download App</a></li>
                    <li class="nav-item"><a class="nav-link" href="terms.html">Terms</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="privacy.html">Privacy</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQs</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="download-container">
        <!-- Header with Logo -->
        <div class="header">
            <img src="logo.jpeg" alt="Desibhasha Logo" class="logo">
            <h1>Download Our App</h1>
            <p>Drop your email below to receive iOS and Android download links</p>
        </div>
        <!-- Download Form -->
        <form id="downloadForm" class="download-form">
            <!-- Hidden field for refercode -->
            <input type="hidden" id="refercode" name="refercode" value="">

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email address"
                    required
                    maxlength="100">
                <span class="error-message" id="emailError"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn" id="submitBtn">Send Download Links</button>

            <!-- Loading Spinner -->
            <div class="loader hidden" id="loader"></div>

            <!-- Success Message -->
            <div class="success-message hidden" id="successMessage">
             <p style="font-size:16px; margin-bottom:15px;">
    Go ahead and download the app! We’ve emailed you the links for iOS and Android as well.
  </p>

  <!-- Buttons Container -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">

    <!-- Android -->
    <a href="https://apps.apple.com/in/app/desibhasha/id6759467232" style="display:inline-block;">
      <img 
        src="https://play.google.com/intl/en_us/badges/images/generic/en_badge_web_generic.png"
        alt="Get it on Google Play"
        style="width:180px; max-width:80%; height:auto;">
    </a>

    <!-- iOS -->
    <a href="https://apps.apple.com/in/app/desibhasha/id6759467232" style="display:inline-block;">
      <img 
        src="https://desibhasha.com/apple-badge.png"
        alt="Download on the App Store"
        style="width:180px; max-width:80%; height:auto;">
    </a>

  </div>
            </div>

            <!-- Error Message -->
            <div class="error-alert hidden" id="errorAlert">
                <p id="errorText"></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="download_app.js"></script>
</body>
</html>
